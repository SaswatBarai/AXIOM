name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com

jobs:
  ci:
    name: Run CI checks
    uses: ./.github/workflows/ci.yml

  build-push:
    name: Build & Push ${{ matrix.name }}
    runs-on: ubuntu-latest
    needs: ci
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: axiom-web
            dockerfile: apps/web/Dockerfile
            build_args: |
              NEXT_PUBLIC_API_URL=https://axiom.saswat.app/api
          - name: axiom-api
            dockerfile: apps/api/Dockerfile
            build_args: ""
          - name: axiom-ai
            dockerfile: apps/ai/Dockerfile
            build_args: ""

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: tag
        run: echo "tag=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Registry-backed layer cache stored in ECR (no size limit, unlike the
      # 10 GB GitHub Actions cache). mode=max caches intermediate build stages
      # — critical so the ~6 GB pip-install layer is reused across deploys.
      # image-manifest=true + oci-mediatypes=true are required for ECR.
      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          build-args: ${{ matrix.build_args }}
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ matrix.name }}:${{ steps.tag.outputs.tag }}
            ${{ env.ECR_REGISTRY }}/${{ matrix.name }}:latest
          cache-from: type=registry,ref=${{ env.ECR_REGISTRY }}/${{ matrix.name }}:buildcache
          cache-to: type=registry,ref=${{ env.ECR_REGISTRY }}/${{ matrix.name }}:buildcache,mode=max,image-manifest=true,oci-mediatypes=true

  deploy:
    name: Update Helm values and push
    runs-on: ubuntu-latest
    needs: build-push

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Update image tags in Helm values
        run: |
          IMAGE_TAG="${GITHUB_SHA::8}"
          sed -i "s/^\(\s*tag:\).*/\1 ${IMAGE_TAG}/" helm/axiom-web/values-prod.yaml
          sed -i "s/^\(\s*tag:\).*/\1 ${IMAGE_TAG}/" helm/axiom-api/values-prod.yaml
          sed -i "s/^\(\s*tag:\).*/\1 ${IMAGE_TAG}/" helm/axiom-ai/values-prod.yaml

      - name: Commit and push updated values
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add helm/axiom-web/values-prod.yaml helm/axiom-api/values-prod.yaml helm/axiom-ai/values-prod.yaml
          git diff --staged --quiet || git commit -m "chore(deploy): bump image tags to ${GITHUB_SHA::8} [skip ci]"
          git push

  verify:
    name: Verify deployment
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      # ArgoCD polls the repo (default 3 min) then rolls out. Poll the public
      # health endpoint with retries instead of a blind sleep so the job
      # reflects the real rollout state.
      - name: Health check
        run: |
          HEALTH_URL="https://axiom.saswat.app/api/health"
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$HEALTH_URL" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed (status 200) after $((i*20))s"
              exit 0
            fi
            echo "Attempt $i: status $STATUS — waiting 20s..."
            sleep 20
          done
          echo "Health check failed: $HEALTH_URL never returned 200"
          exit 1
