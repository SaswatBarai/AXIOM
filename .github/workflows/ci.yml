name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_call:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-api:
    name: Test API (Node.js)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @axiom/database exec prisma generate
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci

      - name: Run database migrations
        run: pnpm --filter @axiom/database exec prisma migrate deploy
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci

      - name: Typecheck @axiom/database
        run: pnpm --filter @axiom/database exec tsc --noEmit
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci

      - name: Typecheck @axiom/api
        run: pnpm --filter @axiom/api exec tsc --noEmit
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci

      - name: Typecheck @axiom/web
        run: pnpm --filter @axiom/web exec tsc --noEmit
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
          NEXT_PUBLIC_API_URL: http://localhost:4000

      - name: Run API tests
        run: pnpm --filter @axiom/api test --passWithNoTests
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
          NODE_ENV: test
          JWT_SECRET_KEY: ci-test-jwt-secret-key-for-testing-only
          JWT_REFRESH_SECRET: ci-test-jwt-refresh-secret-for-testing-only
          AI_SERVICE_URL: http://localhost:8000
          AI_SERVICE_SECRET: ci-test-ai-secret
          REDIS_URL: redis://localhost:6379
          KAFKA_ENABLED: "false"
          AWS_S3_BUCKET: axiom-test-bucket
          AWS_REGION: us-east-1

  test-ai:
    name: Test AI (Python)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: apps/ai/requirements.txt

      - name: Install Python dependencies
        run: pip install -r apps/ai/requirements.txt

      - name: Run AI service tests
        run: pytest apps/ai/tests -q --tb=short
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
          DEEPSEEK_API_KEY: ci-test-key
          AI_SERVICE_SECRET: ci-test-ai-secret
          REDIS_URL: redis://localhost:6379
          KAFKA_ENABLED: "false"
