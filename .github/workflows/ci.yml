name: CI

on:
  pull_request:
    branches: [main]
  workflow_call:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  node:
    name: Lint, typecheck & test (Node)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @axiom/database db:generate

      - name: Lint
        run: pnpm turbo run lint --filter=@axiom/api --filter=@axiom/web

      - name: Typecheck
        run: pnpm turbo run typecheck --filter=@axiom/api --filter=@axiom/web --filter=@axiom/database

      - name: Test API
        run: pnpm --filter @axiom/api test

  ai:
    name: Test (Python AI)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: apps/ai/requirements.txt

      - name: Install dependencies
        run: pip install -r apps/ai/requirements.txt

      - name: Run tests
        run: pytest apps/ai/tests -q

  build:
    name: Build Docker images
    runs-on: ubuntu-latest
    needs: [node, ai]
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: false
          tags: axiom-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: false
          tags: axiom-web:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build AI image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/ai/Dockerfile
          push: false
          tags: axiom-ai:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
