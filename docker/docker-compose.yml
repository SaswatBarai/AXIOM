services:
  # ── PostgreSQL ────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: axiom-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: axiom_user
      POSTGRES_PASSWORD: axiom_pass
      POSTGRES_DB: axiom
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U axiom_user -d axiom"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: axiom-redis
    restart: unless-stopped
    command: redis-server --requirepass "${REDIS_PASSWORD:-dev-redis-pass}"
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-dev-redis-pass}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Zookeeper (Kafka dependency) ──────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.7.0
    container_name: axiom-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  # ── Kafka ─────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.7.0
    container_name: axiom-kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: SASL_PLAINTEXT://localhost:9092
      KAFKA_SASL_ENABLED_MECHANISMS: PLAIN
      KAFKA_SASL_MECHANISM_INTER_BROKER_PROTOCOL: PLAIN
      KAFKA_OPTS: "-Djava.security.auth.login.config=/etc/kafka/kafka_jaas.conf"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  # ── MinIO (local S3) ──────────────────────────────────────
  minio:
    image: minio/minio:RELEASE.2024-06-22T05-26-45Z
    container_name: axiom-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console → http://localhost:9001
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Create the bucket automatically on first start
  minio-init:
    image: minio/mc:latest
    container_name: axiom-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/axiom-resumes &&
        mc anonymous set private local/axiom-resumes
      "

  # ── Elasticsearch ─────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.14.0
    container_name: axiom-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:-dev-es-pass}
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── DB Migrate (runs migrations before API starts) ────────
  db-migrate:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    container_name: axiom-db-migrate
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://axiom_user:axiom_pass@postgres:5432/axiom
    command: npx prisma migrate deploy --schema=packages/database/prisma/schema.prisma

  # ── AI service ────────────────────────────────────────────
  ai:
    build:
      context: ..
      dockerfile: apps/ai/Dockerfile
    container_name: axiom-ai
    restart: unless-stopped
    read_only: true
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://axiom_user:axiom_pass@postgres:5432/axiom
      - REDIS_URL=redis://:${REDIS_PASSWORD:-dev-redis-pass}@redis:6379/0
      - KAFKA_BROKERS=kafka:9092
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=gemini-2.5-flash-lite
      - OPENAI_API_KEY=${OPENAI_API_KEY:-your_openai_key}
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
      - AWS_REGION=us-east-1
      - AWS_S3_BUCKET=axiom-resumes
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-dev_jwt_secret_change_in_production}
      - AI_SERVICE_PORT=8000
      - AI_SERVICE_SECRET=${AI_SERVICE_SECRET:-dev-ai-secret-change-in-production}
    ports:
      - "8000:8000"

  # ── API (Backend) ─────────────────────────────────────────
  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    container_name: axiom-api
    restart: unless-stopped
    read_only: true
    cap_drop:
      - ALL
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      db-migrate:
        condition: service_completed_successfully
    environment:
      - DATABASE_URL=postgresql://axiom_user:axiom_pass@postgres:5432/axiom
      - REDIS_URL=redis://:${REDIS_PASSWORD:-dev-redis-pass}@redis:6379/0
      - KAFKA_BROKERS=kafka:9092
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-dev_jwt_secret_change_in_production}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-dev_jwt_refresh_secret_change_in_production}
      - JWT_EXPIRY=7d
      - S3_ENDPOINT=http://minio:9000
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
      - AWS_REGION=us-east-1
      - AWS_S3_BUCKET=axiom-resumes
      - NODE_ENV=development
      - API_PORT=4000
      - FRONTEND_URL=http://web:3000
      - AI_SERVICE_URL=http://ai:8000
      - AI_SERVICE_SECRET=dev-ai-secret-change-in-production
      - KAFKA_ENABLED=false
      - EMAIL_FROM=AXIOM <noreply@axiom.dev>
    ports:
      - "4000:4000"

  # ── Web (Frontend) ────────────────────────────────────────
  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    container_name: axiom-web
    restart: unless-stopped
    read_only: true
    depends_on:
      - api
    environment:
      - NODE_ENV=production
      - PORT=3000
      - API_URL=http://api:4000
    ports:
      - "3000:3000"

  # ── Nginx Reverse Proxy ───────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: axiom-nginx
    restart: unless-stopped
    read_only: true
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - web
      - api
      - ai

volumes:
  postgres_data:
  redis_data:
  minio_data:
  es_data:
