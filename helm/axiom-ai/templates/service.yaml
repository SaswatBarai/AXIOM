apiVersion: v1
kind: Service
metadata:
  name: {{ include "axiom-ai.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "axiom-ai.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "axiom-ai.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}
      protocol: TCP
