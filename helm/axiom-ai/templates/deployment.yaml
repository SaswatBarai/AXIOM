apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "axiom-ai.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "axiom-ai.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "axiom-ai.selectorLabels" . | nindent 6 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        {{- include "axiom-ai.selectorLabels" . | nindent 8 }}
    spec:
      terminationGracePeriodSeconds: 60
      volumes:
        - name: rds-ca
          configMap:
            name: axiom-api-rds-ca
      containers:
        - name: axiom-ai
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          volumeMounts:
            - name: rds-ca
              mountPath: /etc/ssl/rds
              readOnly: true
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          {{- if .Values.envFrom }}
          envFrom:
            {{- toYaml .Values.envFrom | nindent 12 }}
          {{- end }}
          env:
            - name: AI_SERVICE_PORT
              value: {{ .Values.env.AI_SERVICE_PORT | quote }}
            - name: KAFKA_ENABLED
              value: {{ .Values.env.KAFKA_ENABLED | quote }}
            - name: HF_HOME
              value: {{ .Values.env.HF_HOME | quote }}
            - name: TRANSFORMERS_CACHE
              value: {{ .Values.env.TRANSFORMERS_CACHE | quote }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: {{ .Values.livenessProbe.httpGet.path }}
              port: {{ .Values.livenessProbe.httpGet.port }}
            initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.livenessProbe.failureThreshold }}
          readinessProbe:
            httpGet:
              path: {{ .Values.readinessProbe.httpGet.path }}
              port: {{ .Values.readinessProbe.httpGet.port }}
            initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.readinessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.readinessProbe.failureThreshold }}
