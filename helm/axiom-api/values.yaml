image:
  repository: 833453046877.dkr.ecr.us-east-1.amazonaws.com/axiom-api
  tag: latest
  pullPolicy: IfNotPresent

replicaCount: 2

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

service:
  type: ClusterIP
  port: 4000

env:
  NODE_ENV: production
  PORT: "4000"
  KAFKA_ENABLED: "false"
  AI_SERVICE_URL: http://axiom-ai:8000

envFrom:
  - secretRef:
      name: axiom-secrets

livenessProbe:
  httpGet:
    path: /health
    port: 4000
  initialDelaySeconds: 15
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health
    port: 4000
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

hpa:
  minReplicas: 2
  maxReplicas: 8
  cpuTargetUtilization: 70
  memoryTargetUtilization: 80
