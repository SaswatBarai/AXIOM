apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "axiom-web.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "axiom-web.labels" . | nindent 4 }}
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: nginx
  rules:
  - host: axiom.saswat.app
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: {{ include "axiom-web.fullname" . }}
            port:
              number: {{ .Values.service.port }}
